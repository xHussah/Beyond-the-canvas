<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyond the Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:   #FAF7F2;
    --ink:     #1A1612;
    --muted:   #7A7168;
    --border:  #E2DDD7;
    --happy:   #4CAF50;
    --angry:   #F44336;
    --sad:     #2196F3;
    --fear:    #FF9800;
    --card-bg: #FFFFFF;
    --shadow:  0 4px 32px rgba(26,22,18,.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ───────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: .5;
  }

  /* ── Layout ──────────────────────────────────────────────────── */
  .page {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown .7s ease both;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    line-height: 1.1;
    font-weight: 700;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .subtitle {
    margin-top: 16px;
    font-size: 15px;
    color: var(--muted);
    max-width: 480px;
    margin-left: auto; margin-right: auto;
    line-height: 1.6;
  }

  .tag-row {
    display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap; margin-top: 20px;
  }

  .tag {
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 12px; border: 1px solid var(--border);
    border-radius: 99px; color: var(--muted);
  }

  /* ── Upload card ─────────────────────────────────────────────── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    box-shadow: var(--shadow);
    animation: fadeUp .7s .15s ease both;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 52px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--ink);
    background: #F7F4EF;
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    width: 52px; height: 52px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--cream);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: transform .2s;
  }

  .drop-zone:hover .drop-icon { transform: translateY(-3px); }

  .drop-label {
    font-size: 15px; font-weight: 500; color: var(--ink);
    margin-bottom: 6px;
  }
  .drop-hint { font-size: 13px; color: var(--muted); }

  /* ── Preview ─────────────────────────────────────────────────── */
  #preview-section {
    display: none;
    margin-top: 28px;
    animation: fadeUp .4s ease both;
  }

  .preview-wrap {
    display: flex; gap: 20px; align-items: flex-start;
    flex-wrap: wrap;
  }

  .preview-img-box {
    flex: 0 0 auto;
    width: 180px; height: 180px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--cream);
    position: relative;
  }

  .preview-img-box img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .change-btn {
    position: absolute; bottom: 8px; right: 8px;
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(255,255,255,.9); border: 1px solid var(--border);
    cursor: pointer; color: var(--ink);
    transition: background .2s;
  }
  .change-btn:hover { background: white; }

  .preview-meta {
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }

  .filename {
    font-size: 13px; color: var(--muted);
    word-break: break-all;
  }

  /* ── Analyse button ──────────────────────────────────────────── */
  .analyse-btn {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    letter-spacing: .04em;
    background: var(--ink);
    color: var(--cream);
    border: none; border-radius: 12px;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    display: none;
  }

  .analyse-btn:hover { opacity: .85; transform: translateY(-1px); }
  .analyse-btn:active { transform: translateY(0); }
  .analyse-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  /* ── Spinner ─────────────────────────────────────────────────── */
  .spinner {
    display: none;
    width: 22px; height: 22px;
    border: 2.5px solid rgba(250,247,242,.3);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }

  /* ── Result ──────────────────────────────────────────────────── */
  #result-section {
    display: none;
    margin-top: 32px;
    animation: fadeUp .5s ease both;
  }

  .result-divider {
    height: 1px; background: var(--border);
    margin-bottom: 32px;
  }

  .result-headline {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 20px;
  }

  .emotion-display {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px;
  }

  .emotion-badge {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  }

  .emotion-badge.pop { transform: scale(1.15); }

  .emotion-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .confidence-line {
    font-size: 13px; color: var(--muted);
  }

  .confidence-line strong {
    color: var(--ink); font-weight: 500;
  }

  /* ── Probability bars ────────────────────────────────────────── */
  .prob-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (max-width: 520px) {
    .prob-grid { grid-template-columns: 1fr; }
  }

  .prob-row {
    display: flex; flex-direction: column; gap: 5px;
  }

  .prob-label-row {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
    text-transform: capitalize; letter-spacing: .03em;
  }

  .prob-label-row .pct { font-weight: 500; color: var(--ink); }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    width: 0;
    transition: width .8s cubic-bezier(.22,1,.36,1);
  }

  /* ── Error ───────────────────────────────────────────────────── */
  .error-box {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    background: #FFF5F5;
    border: 1px solid #FFCDD2;
    border-radius: 10px;
    font-size: 13px;
    color: #c62828;
  }

  /* ── Animations ──────────────────────────────────────────────── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header>
    <h1>Beyond <em>the</em> Canvas</h1>
    <p class="subtitle">Upload a child's drawing and our model will detect the emotional signal embedded within it.</p>
    <div class="tag-row">
      <span class="tag">😊 Happy</span>
      <span class="tag">😡 Angry</span>
      <span class="tag">😢 Sad</span>
      <span class="tag">😨 Fear</span>
    </div>
  </header>

  <!-- Upload card -->
  <div class="card">

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="drop-icon">🖼️</div>
      <p class="drop-label">Drop a drawing here, or click to browse</p>
      <p class="drop-hint">JPG · PNG · WEBP · up to 10 MB</p>
    </div>

    <!-- Preview -->
    <div id="preview-section">
      <div class="preview-wrap">
        <div class="preview-img-box">
          <img id="previewImg" src="" alt="preview" />
          <button class="change-btn" onclick="resetAll()">Change</button>
        </div>
        <div class="preview-meta">
          <p class="filename" id="fileName"></p>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>

    <!-- Analyse button -->
    <button class="analyse-btn" id="analyseBtn" onclick="analyse()">
      <span id="btnText">Analyse Drawing</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <!-- Result -->
    <div id="result-section">
      <div class="result-divider"></div>
      <p class="result-headline">Detected Emotion</p>

      <div class="emotion-display">
        <div class="emotion-badge" id="emotionBadge"></div>
        <div class="emotion-text">
          <h2 id="emotionLabel"></h2>
          <p class="confidence-line">Confidence: <strong id="confidenceVal"></strong></p>
        </div>
      </div>

      <div class="prob-grid" id="probGrid"></div>
    </div>

  </div><!-- /card -->

</div><!-- /page -->

<script>
  const PALETTE = { happy: '#4CAF50', angry: '#F44336', sad: '#2196F3', fear: '#FF9800' };
  const EMOJI   = { happy: '😊', angry: '😡', sad: '😢', fear: '😨' };

  const fileInput    = document.getElementById('fileInput');
  const dropZone     = document.getElementById('dropZone');
  const previewSec   = document.getElementById('preview-section');
  const previewImg   = document.getElementById('previewImg');
  const fileName     = document.getElementById('fileName');
  const analyseBtn   = document.getElementById('analyseBtn');
  const btnText      = document.getElementById('btnText');
  const spinner      = document.getElementById('spinner');
  const resultSec    = document.getElementById('result-section');
  const errorBox     = document.getElementById('errorBox');

  let selectedFile = null;

  // ── File selection ──────────────────────────────────────────────
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    fileName.textContent = file.name;
    previewSec.style.display = 'block';
    analyseBtn.style.display = 'block';
    resultSec.style.display  = 'none';
    errorBox.style.display   = 'none';
    dropZone.style.display   = 'none';
  }

  function resetAll() {
    selectedFile = null;
    fileInput.value = '';
    previewSec.style.display = 'none';
    analyseBtn.style.display = 'none';
    resultSec.style.display  = 'none';
    errorBox.style.display   = 'none';
    dropZone.style.display   = 'block';
  }

  // ── Analyse ─────────────────────────────────────────────────────
  async function analyse() {
    if (!selectedFile) return;

    // Loading state
    btnText.style.display  = 'none';
    spinner.style.display  = 'block';
    analyseBtn.disabled    = true;
    errorBox.style.display = 'none';

    try {
      const formData = new FormData();
      formData.append('image', selectedFile);

      const resp = await fetch('http://localhost:5000/predict', { method: 'POST', body: formData });
      if (!resp.ok) throw new Error('Server error: ' + resp.status);
      const data = await resp.json();

      showResult(data);
    } catch (err) {
      showError(err.message.includes('Failed to fetch')
        ? '⚠ Cannot reach the server. Make sure server.py is running (python server.py).'
        : '⚠ ' + err.message);
    } finally {
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
      analyseBtn.disabled   = false;
    }
  }

  // ── Render result ────────────────────────────────────────────────
  function showResult(data) {
    const { prediction, confidence, probabilities, color } = data;

    // Emotion badge & label
    const badge = document.getElementById('emotionBadge');
    badge.textContent = EMOJI[prediction] || '🎨';
    badge.style.background = color + '22';
    badge.style.border = '2px solid ' + color + '55';

    document.getElementById('emotionLabel').textContent = prediction.charAt(0).toUpperCase() + prediction.slice(1);
    document.getElementById('emotionLabel').style.color = color;
    document.getElementById('confidenceVal').textContent = (confidence * 100).toFixed(1) + '%';

    // Animate badge
    setTimeout(() => { badge.classList.add('pop'); setTimeout(() => badge.classList.remove('pop'), 400); }, 100);

    // Probability bars
    const grid = document.getElementById('probGrid');
    grid.innerHTML = '';
    const sorted = Object.entries(probabilities).sort((a,b) => b[1] - a[1]);
    sorted.forEach(([cls, prob]) => {
      const row = document.createElement('div');
      row.className = 'prob-row';
      row.innerHTML = `
        <div class="prob-label-row">
          <span>${EMOJI[cls] || ''} ${cls.charAt(0).toUpperCase()+cls.slice(1)}</span>
          <span class="pct">${(prob*100).toFixed(1)}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${PALETTE[cls]||'#888'}" data-width="${prob*100}"></div>
        </div>`;
      grid.appendChild(row);
    });

    resultSec.style.display = 'block';

    // Animate bars after paint
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.width + '%';
      });
    });
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
</script>

</body>
</html>
